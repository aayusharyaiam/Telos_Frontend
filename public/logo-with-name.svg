<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- Atom icon scaled to fit left side -->
  <g transform="translate(40,40) scale(0.35)">
    <!-- Orbit 1 - Silver/White -->
    <ellipse cx="0" cy="0" rx="85" ry="35" transform="rotate(-30)" stroke="url(#wn-silver)" stroke-width="6" fill="none" opacity="0.9"/>
    <!-- Orbit 2 - Blue/Indigo -->
    <ellipse cx="0" cy="0" rx="85" ry="35" transform="rotate(30)" stroke="url(#wn-blue)" stroke-width="6" fill="none" opacity="0.9"/>
    <!-- Orbit 3 - Emerald/Teal -->
    <ellipse cx="0" cy="0" rx="85" ry="35" transform="rotate(90)" stroke="url(#wn-green)" stroke-width="6" fill="none" opacity="0.9"/>
    <!-- Central nucleus -->
    <rect x="-10" y="-10" width="20" height="20" rx="3" transform="rotate(45)" fill="url(#wn-nucleus)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="-6" y="-6" width="12" height="12" rx="2" transform="rotate(45)" fill="url(#wn-nucleusInner)" opacity="0.8"/>
    <rect x="-3" y="-3" width="6" height="6" rx="1" transform="rotate(45)" fill="white" opacity="0.9"/>
  </g>
  <!-- Vertical divider -->
  <line x1="82" y1="18" x2="82" y2="62" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- TELOS text -->
  <text x="96" y="42" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="30" letter-spacing="3" fill="white">TELOS</text>
  <!-- ATOMQUEST text -->
  <text x="96" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" letter-spacing="4" fill="rgba(255,255,255,0.6)">ATOMQUEST</text>
  <!-- Gradients -->
  <defs>
    <linearGradient id="wn-silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c8d4"/>
      <stop offset="50%" stop-color="#e8edf3"/>
      <stop offset="100%" stop-color="#c0c8d4"/>
    </linearGradient>
    <linearGradient id="wn-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="wn-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="wn-nucleus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wn-nucleusInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
</svg>
