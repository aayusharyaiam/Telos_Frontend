<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Orbit 1 - Silver/White -->
  <ellipse cx="100" cy="100" rx="85" ry="35" transform="rotate(-30 100 100)" stroke="url(#silver)" stroke-width="5" fill="none" opacity="0.9"/>
  <!-- Orbit 2 - Blue/Indigo -->
  <ellipse cx="100" cy="100" rx="85" ry="35" transform="rotate(30 100 100)" stroke="url(#blue)" stroke-width="5" fill="none" opacity="0.9"/>
  <!-- Orbit 3 - Emerald/Teal -->
  <ellipse cx="100" cy="100" rx="85" ry="35" transform="rotate(90 100 100)" stroke="url(#green)" stroke-width="5" fill="none" opacity="0.9"/>
  <!-- Central nucleus diamond -->
  <g transform="translate(100,100)">
    <rect x="-12" y="-12" width="24" height="24" rx="3" transform="rotate(45)" fill="url(#nucleus)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="-7" y="-7" width="14" height="14" rx="2" transform="rotate(45)" fill="url(#nucleusInner)" opacity="0.8"/>
    <rect x="-3" y="-3" width="6" height="6" rx="1" transform="rotate(45)" fill="white" opacity="0.9"/>
  </g>
  <!-- Glow filters and gradients -->
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c8d4"/>
      <stop offset="50%" stop-color="#e8edf3"/>
      <stop offset="100%" stop-color="#c0c8d4"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="nucleus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="nucleusInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
</svg>
